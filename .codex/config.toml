# Inherit model, reasoning, and personal preferences from ~/.codex/config.toml.
# The global launcher layer now enforces root + full-access execution; this
# repo-local template remains project-scoped for compatibility surfaces.
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# BEGIN GENERATED MCP SERVERS: codex-mcp-sync
# Generated by surfacekit/scripts/codex-mcp-sync.sh from .mcp.json and mcp-profile-policy.json
# Discovery-first codexkit profile for fleet baseline and sync inspection.
[mcp_servers.codexkit_review]
command = "bash"
args = ["./scripts/run-codexkit-mcp.sh"]
cwd = "."
enabled_tools = [
  "baseline_check",
  "baseline_check_all",
  "skill_list",
  "skill_diff",
  "mcp_list",
  "mcp_diff",
  "fleet_audit",
  "fleet_report",
]

# Curated codexkit workspace for skill sync, MCP sync, and fleet validation.
[mcp_servers.codexkit_workspace]
command = "bash"
args = ["./scripts/run-codexkit-mcp.sh"]
cwd = "."
enabled_tools = [
  "baseline_check",
  "baseline_check_all",
  "skill_sync",
  "skill_list",
  "skill_diff",
  "mcp_sync",
  "mcp_list",
  "mcp_diff",
  "fleet_audit",
  "fleet_report",
]

# END GENERATED MCP SERVERS: codex-mcp-sync

[profiles.readonly_quiet]
approval_policy = "never"
sandbox_mode = "read-only"
model_reasoning_effort = "medium"

[profiles.review]
approval_policy = "on-request"
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.workspace_auto]
approval_policy = "on-failure"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"

[profiles.ci_json]
approval_policy = "never"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
